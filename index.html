    :root{--bg:#2D3E24;--cream:#F5F5DC;--card:rgba(245,245,220,0.07);--border:rgba(245,245,220,0.12);--green-dark:#1e2d18;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:0;min-height:100vh;}
    .hidden{display:none!important;}

    /* ── AUTH ── */
    #auth-screen{display:grid;place-items:center;min-height:100vh;padding:24px;}
    .auth-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 28px;width:100%;max-width:360px;backdrop-filter:blur(12px);}
    .logo{text-align:center;margin-bottom:32px;}
    .logo h1{font-weight:200;letter-spacing:.35em;font-size:17px;margin:0;text-transform:uppercase;}
    .logo em{font-family:Georgia,serif;font-style:italic;}
    .auth-card input{width:100%;padding:14px 16px;margin:8px 0;border-radius:14px;border:1px solid var(--border);background:rgba(0,0,0,0.25);color:var(--cream);font-size:16px;outline:none;}
    .auth-card input::placeholder{opacity:.5;}
    .btn-primary{width:100%;padding:16px;margin-top:16px;border-radius:14px;border:none;background:var(--cream);color:var(--bg);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;}
    .btn-ghost{width:100%;padding:13px;margin-top:10px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--cream);font-size:11px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;}
    #auth-msg{text-align:center;font-size:12px;margin-top:16px;min-height:18px;opacity:.85;line-height:1.4;}

    /* ── APP SHELL ── */
    #app-screen{display:flex;flex-direction:column;min-height:100vh;}
    .app-header{padding:16px 20px 12px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:20;}
    .app-header h1{font-weight:200;letter-spacing:.3em;font-size:14px;margin:0;text-transform:uppercase;}
    .app-header em{font-family:Georgia,serif;font-style:italic;}

    /* ── TABS ── */
    .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:53px;z-index:19;}
    .tab{flex:1;padding:12px;text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.45;cursor:pointer;border-bottom:2px solid transparent;}
    .tab.active{opacity:1;border-bottom:2px solid var(--cream);}

    /* ── CALENDAR ── */

    .week-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(0,0,0,0.1);}

    .week-label span{display:block;font-size:10px;opacity:.5;text-transform:uppercase;}
    .week-label strong{font-size:15px;}
    .days-strip{display:flex;justify-content:space-around;padding:10px 8px;background:rgba(245,245,220,0.03);}
    .day-pill{text-align:center;padding:8px 6px;border-radius:50px;min-width:38px;cursor:pointer;}

    .day-pill .dd{font-size:15px;font-weight:600;}
    .day-pill.active .dn{opacity:.6;}
    .classes-list{padding:16px;}
    .class-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
    .class-card.booked{border-color:rgba(245,245,220,0.35);background:rgba(245,245,220,0.1);}
    .class-card.full{opacity:.6;}
    .ci-time{font-size:11px;opacity:.55;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
    .ci-name{font-size:18px;font-weight:300;margin:2px 0;}
    .ci-inst{font-size:12px;opacity:.55;}
    .spots-badge{font-size:10px;font-weight:700;text-transform:uppercase;padding:4px 9px;border-radius:6px;background:rgba(245,245,220,0.1);white-space:nowrap;}
    .spots-badge.urgent{background:rgba(220,80,60,0.25);color:#ff9988;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
    .btn-book{padding:10px 18px;border-radius:10px;border:none;background:var(--cream);color:var(--bg);font-weight:700;font-size:11px;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
    .btn-cancel{padding:10px 18px;border-radius:10px;border:1px solid rgba(245,245,220,0.3);background:transparent;color:var(--cream);font-weight:700;font-size:11px;text-transform:uppercase;cursor:pointer;}
    .btn-waitlist{padding:10px 18px;border-radius:10px;border:1px solid rgba(245,245,220,0.2);background:transparent;color:var(--cream);font-size:11px;cursor:pointer;}
    .no-classes{text-align:center;padding:40px 20px;opacity:.4;font-size:14px;}

    .cal-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;opacity:.3;}

    .cal-day.attended::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--cream);}
    .stats-row{display:flex;gap:12px;margin-bottom:20px;}
    .stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
    .stat-card .sv{font-size:28px;font-weight:200;}
    .stat-card .sl{font-size:10px;text-transform:uppercase;opacity:.5;letter-spacing:.1em;margin-top:4px;}

    .profile-header{text-align:center;padding:20px 0 28px;}
    .avatar{width:72px;height:72px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
    .profile-name{font-size:20px;font-weight:300;}
    .profile-email{font-size:12px;opacity:.5;margin-top:4px;}
    .menu-item{display:flex;justify-content:space-between;align-items:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;cursor:pointer;}
    .menu-item-label{font-size:14px;}
    .menu-item-sub{font-size:11px;opacity:.5;margin-top:2px;}
    .menu-arrow{opacity:.4;font-size:18px;}
    .btn-whatsapp{width:100%;padding:16px;border-radius:14px;border:none;background:#25D366;color:#fff;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;margin-top:10px;}
